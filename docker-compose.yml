services:
  api:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: mtgpacker-api
    ports:
      - "3333:3333"
    environment:
      PORT: "3333"
      DB_PATH: /app/data/mtg_packer.db
    volumes:
      - mtgpacker-data:/app/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mtgpacker-web
    depends_on:
      - api
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  mtgpacker-data: