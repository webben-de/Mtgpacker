services:
  api:
    image: registry.web-ben.de/mtgpacker/web:latest
    container_name: mtgpacker-api
    ports:
      - "3333:3333"
    environment:
      PORT: "3333"
      DB_PATH: /app/data/mtg_packer.db
    volumes:
      - mtgpacker-data:/app/data
    restart: unless-stopped

  frontend:
    container_name: mtgpacker-frontend
    image: registry.web-ben.de/mtgpacker/web:latest
    restart: unless-stopped

volumes:
  mtgpacker-data: