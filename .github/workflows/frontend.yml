name: Build Frontend

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/frontend.yml'
      - 'web/**'
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [main]

env:
  NODE_VERSION: 24.x
  APP_NAME: web

jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npx nx lint ${{ env.APP_NAME }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npx nx build ${{ env.APP_NAME }} --configuration=production
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ env.APP_NAME }}
          path: dist/web

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ env.APP_NAME }}
          path: dist/web
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./Dockerfile
          push: true
          tags: |
            registry.web-ben.de/mtgpacker/${{ env.APP_NAME }}:latest
            registry.web-ben.de/mtgpacker/${{ env.APP_NAME }}:${{ github.sha }}
      - name: Trigger Watchtower
        run: |
          curl -H "Authorization: Bearer ${{ env.WATCHTOWER_TOKEN }}" http://mtgpacker.web-ben.de/v1/update
        env:
          WATCHTOWER_TOKEN: ${{ secrets.WATCHTOWER_TOKEN }}
