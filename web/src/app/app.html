<div class="flex min-h-dvh bg-mtg-bg">
  <app-sidebar-nav [vm]="vm"></app-sidebar-nav>

  @if (showLoginModal) {
    <app-login-modal
      [githubEnabled]="githubEnabled"
      [googleEnabled]="googleEnabled"
      [discordEnabled]="discordEnabled"
      (loginWith)="loginWith($event)"
      (close)="showLoginModal = false"
    ></app-login-modal>
  }

  <main class="flex-1 overflow-auto min-w-0 p-6 md:p-8 animate-fade-in">
    <app-global-feedback [vm]="vm"></app-global-feedback>

    @if (menu === 'Teilnehmer-Ansicht') {
    <app-voting-view [vm]="vm"></app-voting-view>
    } @if (menu === 'Bestellen') {
    <app-order-view [vm]="vm"></app-order-view>
    } @if (menu === 'Verwalter-Bereich') {
    <app-admin-view [vm]="vm"></app-admin-view>
    }
  </main>
</div>
