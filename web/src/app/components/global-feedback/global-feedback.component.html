@if (vm.infoMessage) {
  <div
    class="mb-6 rounded-lg bg-emerald-500/10 border border-emerald-500/30 px-4 py-3 flex items-center gap-3 animate-scale-in"
    role="status"
    aria-live="polite"
  >
    <svg
      class="w-4 h-4 text-emerald-400 shrink-0"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      viewBox="0 0 24 24"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
      />
    </svg>
    <p class="font-body text-sm text-emerald-300">{{ vm.infoMessage }}</p>
  </div>
}

@if (vm.errorMessage) {
  <div
    class="mb-6 rounded-lg bg-red-500/10 border border-red-500/30 px-4 py-3 flex items-center gap-3 animate-scale-in"
    role="alert"
    aria-live="assertive"
  >
    <svg
      class="w-4 h-4 text-red-400 shrink-0"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      viewBox="0 0 24 24"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"
      />
    </svg>
    <p class="font-body text-sm text-red-300">{{ vm.errorMessage }}</p>
  </div>
}
