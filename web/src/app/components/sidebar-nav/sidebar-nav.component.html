<aside
  class="w-60 shrink-0 bg-mtg-card border-r border-mtg-border flex flex-col"
>
  <div class="px-5 py-6 border-b border-mtg-border">
    <div class="flex items-center gap-3">
      <div
        class="w-9 h-9 rounded-lg bg-mtg-primary/20 border border-mtg-primary/40 flex items-center justify-center shadow-glow-primary"
      >
        <svg
          class="w-5 h-5 text-mtg-secondary"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09Z"
          />
        </svg>
      </div>
      <div>
        <p class="font-display text-base text-mtg-gold leading-none">
          MtG Packer
        </p>
        <p class="font-body text-xs text-mtg-muted mt-0.5">Koffer-Optimierer</p>
      </div>
    </div>
  </div>

  <nav class="flex-1 p-3 space-y-1" aria-label="Hauptnavigation">
    <button
      (click)="vm.menu = 'Teilnehmer-Ansicht'; vm.onMenuChange()"
      [class]="
        vm.menu === 'Teilnehmer-Ansicht'
          ? 'w-full flex items-center gap-3 px-3 py-2.5 rounded-lg bg-mtg-primary/15 text-mtg-text border border-mtg-primary/40 font-body text-sm cursor-pointer transition-all duration-200'
          : 'w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-mtg-muted border border-transparent hover:bg-mtg-card-hover hover:text-mtg-text font-body text-sm cursor-pointer transition-all duration-200'
      "
    >
      <svg
        class="w-[18px] h-[18px] shrink-0"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 0 0 2.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 0 0-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75 2.25 2.25 0 0 0-.1-.664m-5.8 0A2.251 2.251 0 0 1 13.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25Z"
        />
      </svg>
      <span>Abstimmung</span>
    </button>

    <button
      (click)="vm.menu = 'Bestellen'; vm.onMenuChange()"
      [class]="
        vm.menu === 'Bestellen'
          ? 'w-full flex items-center gap-3 px-3 py-2.5 rounded-lg bg-mtg-primary/15 text-mtg-text border border-mtg-primary/40 font-body text-sm cursor-pointer transition-all duration-200'
          : 'w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-mtg-muted border border-transparent hover:bg-mtg-card-hover hover:text-mtg-text font-body text-sm cursor-pointer transition-all duration-200'
      "
    >
      <svg
        class="w-[18px] h-[18px] shrink-0"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M15.75 10.5V6a3.75 3.75 0 1 0-7.5 0v4.5m11.356-1.993 1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 0 1-1.12-1.243l1.264-12A1.125 1.125 0 0 1 5.513 7.5h12.974c.576 0 1.059.435 1.119 1.007Z"
        />
      </svg>
      <span>Proxies bestellen</span>
    </button>

    <button
      (click)="vm.menu = 'Verwalter-Bereich'; vm.onMenuChange()"
      [class]="
        vm.menu === 'Verwalter-Bereich'
          ? 'w-full flex items-center gap-3 px-3 py-2.5 rounded-lg bg-mtg-primary/15 text-mtg-text border border-mtg-primary/40 font-body text-sm cursor-pointer transition-all duration-200'
          : 'w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-mtg-muted border border-transparent hover:bg-mtg-card-hover hover:text-mtg-text font-body text-sm cursor-pointer transition-all duration-200'
      "
    >
      <svg
        class="w-[18px] h-[18px] shrink-0"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z"
        />
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
        />
      </svg>
      <span>Admin</span>
    </button>
  </nav>

  <div class="px-4 py-4 border-t border-mtg-border">
    @if (vm.currentUser) {
      <div class="flex items-center gap-2.5 mb-3">
        @if (vm.currentUser.avatar) {
          <img
            [src]="vm.currentUser.avatar"
            [alt]="vm.currentUser.displayName"
            class="w-7 h-7 rounded-full border border-mtg-border"
          />
        } @else {
          <div
            class="w-7 h-7 rounded-full bg-mtg-primary/20 border border-mtg-primary/30 flex items-center justify-center"
          >
            <svg
              class="w-4 h-4 text-mtg-secondary"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"
              />
            </svg>
          </div>
        }
        <div class="flex-1 min-w-0">
          <p class="font-body text-xs font-semibold text-mtg-text truncate">
            {{ vm.currentUser.displayName || vm.currentUser.login }}
          </p>
          @if (vm.currentUser.isAdmin) {
            <span class="font-body text-[10px] text-mtg-secondary">Admin</span>
          }
        </div>
      </div>
      <button
        (click)="vm.logout()"
        class="w-full flex items-center gap-2 px-3 py-1.5 rounded-lg text-mtg-muted hover:text-mtg-text hover:bg-mtg-card-hover font-body text-xs cursor-pointer transition-all duration-150 border border-transparent hover:border-mtg-border"
      >
        <svg
          class="w-3.5 h-3.5 shrink-0"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15m-3 0-3-3m0 0 3-3m-3 3H15"
          />
        </svg>
        Abmelden
      </button>
    } @else {
      <button
        (click)="vm.login()"
        class="w-full flex items-center gap-2 px-3 py-2 rounded-lg bg-mtg-primary/10 hover:bg-mtg-primary/20 text-mtg-secondary hover:text-mtg-text font-body text-xs cursor-pointer transition-all duration-150 border border-mtg-primary/20 hover:border-mtg-primary/40"
      >
        <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 24 24">
          <path
            d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"
          />
        </svg>
        Mit GitHub anmelden
      </button>
      <p class="font-body text-[10px] text-mtg-muted mt-2 text-center">
        oder Namen unten eingeben
      </p>
    }

    <div class="mt-3 flex gap-2">
      <a
        href="https://scryfall.com"
        target="_blank"
        rel="noopener noreferrer"
        class="font-body text-[10px] text-mtg-muted hover:text-mtg-secondary transition-colors duration-150"
        >Scryfall</a
      >
      <span class="text-mtg-border">.</span>
      <a
        href="https://moxfield.com"
        target="_blank"
        rel="noopener noreferrer"
        class="font-body text-[10px] text-mtg-muted hover:text-mtg-secondary transition-colors duration-150"
        >Moxfield</a
      >
    </div>
  </div>
</aside>
