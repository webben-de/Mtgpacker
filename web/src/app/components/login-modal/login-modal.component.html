<!-- Backdrop -->
<div
  class="fixed inset-0 z-50 flex items-center justify-center p-4 animate-backdrop-in"
  (click)="close.emit()"
  style="background: rgba(9,9,28,0.82); backdrop-filter: blur(12px);"
>
  <!-- Panel — liquid glass surface -->
  <div
    class="relative w-full max-w-sm animate-modal-in"
    (click)="$event.stopPropagation()"
    style="
      background: linear-gradient(145deg, rgba(30,27,60,0.95) 0%, rgba(20,18,45,0.98) 100%);
      border: 1px solid rgba(124,58,237,0.22);
      border-radius: 20px;
      box-shadow:
        0 32px 64px rgba(0,0,0,0.6),
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 1px 0 rgba(255,255,255,0.06) inset;
    "
  >
    <!-- Ambient glow behind panel -->
    <div
      class="absolute -inset-px rounded-[20px] pointer-events-none"
      style="background: radial-gradient(ellipse at 50% 0%, rgba(124,58,237,0.12) 0%, transparent 70%);"
    ></div>

    <div class="relative p-8">
      <!-- Close button -->
      <button
        (click)="close.emit()"
        class="absolute top-5 right-5 w-7 h-7 flex items-center justify-center rounded-lg text-mtg-muted hover:text-mtg-text hover:bg-white/5 active:scale-95 transition-[transform,background-color,color] duration-150 cursor-pointer"
        aria-label="Schließen"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
        </svg>
      </button>

      <!-- Header -->
      <div class="mb-6">
        <h2 class="font-display text-xl text-mtg-gold tracking-wide">Anmelden</h2>
        <p class="font-body text-xs text-mtg-muted mt-1">Wähle deinen Login-Anbieter</p>
      </div>

      <!-- Provider buttons — staggered fade-in via animation-delay -->
      <div class="flex flex-col gap-2.5">

        @if (githubEnabled) {
          <button
            (click)="loginWith.emit('github')"
            class="w-full flex items-center gap-3 px-4 py-3 rounded-[12px] font-body text-sm text-white cursor-pointer
                   transition-[transform,opacity,background,border-color] duration-200
                   active:scale-[0.98] active:translate-y-px
                   animate-fade-in"
            style="
              background: rgba(30,30,30,0.9);
              border: 1px solid rgba(255,255,255,0.1);
              box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset;
              animation-delay: 60ms;
            "
            onmouseenter="this.style.borderColor='rgba(255,255,255,0.2)'; this.style.background='rgba(40,40,40,0.95)'"
            onmouseleave="this.style.borderColor='rgba(255,255,255,0.1)'; this.style.background='rgba(30,30,30,0.9)'"
          >
            <svg class="w-5 h-5 shrink-0" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
            </svg>
            <span class="flex-1 text-left">Mit GitHub anmelden</span>
            <svg class="w-3.5 h-3.5 text-white/30" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="m9 18 6-6-6-6"/>
            </svg>
          </button>
        }

        @if (googleEnabled) {
          <button
            (click)="loginWith.emit('google')"
            class="w-full flex items-center gap-3 px-4 py-3 rounded-[12px] font-body text-sm text-mtg-text cursor-pointer
                   transition-[transform,opacity,background,border-color] duration-200
                   active:scale-[0.98] active:translate-y-px
                   animate-fade-in"
            style="
              background: rgba(255,255,255,0.05);
              border: 1px solid rgba(255,255,255,0.1);
              box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset;
              animation-delay: 120ms;
            "
            onmouseenter="this.style.borderColor='rgba(255,255,255,0.18)'; this.style.background='rgba(255,255,255,0.08)'"
            onmouseleave="this.style.borderColor='rgba(255,255,255,0.1)'; this.style.background='rgba(255,255,255,0.05)'"
          >
            <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            <span class="flex-1 text-left">Mit Google anmelden</span>
            <svg class="w-3.5 h-3.5 text-mtg-muted" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="m9 18 6-6-6-6"/>
            </svg>
          </button>
        }

        @if (discordEnabled) {
          <button
            (click)="loginWith.emit('discord')"
            class="w-full flex items-center gap-3 px-4 py-3 rounded-[12px] font-body text-sm text-white cursor-pointer
                   transition-[transform,opacity,background,border-color] duration-200
                   active:scale-[0.98] active:translate-y-px
                   animate-fade-in"
            style="
              background: rgba(88,101,242,0.18);
              border: 1px solid rgba(88,101,242,0.35);
              box-shadow: 0 1px 0 rgba(255,255,255,0.06) inset;
              animation-delay: 180ms;
            "
            onmouseenter="this.style.borderColor='rgba(88,101,242,0.6)'; this.style.background='rgba(88,101,242,0.28)'"
            onmouseleave="this.style.borderColor='rgba(88,101,242,0.35)'; this.style.background='rgba(88,101,242,0.18)'"
          >
            <svg class="w-5 h-5 shrink-0" fill="currentColor" viewBox="0 0 24 24">
              <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.012.043.027.057a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
            </svg>
            <span class="flex-1 text-left">Mit Discord anmelden</span>
            <svg class="w-3.5 h-3.5 text-white/30" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="m9 18 6-6-6-6"/>
            </svg>
          </button>
        }
      </div>

      <!-- Footer -->
      <p class="font-body text-[10px] text-mtg-muted/60 text-center mt-5 leading-relaxed">
        Mit der Anmeldung stimmst du der Speicherung deiner<br>Profildaten zu.
      </p>
    </div>
  </div>
</div>
